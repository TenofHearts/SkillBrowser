[llm]
base_url = "https://your-provider.example/v1"
api_key = "replace-with-your-api-key"
model = "Qwen/Qwen3.5-397B-A17B"
temperature = 0.0
max_tokens = 1024
timeout = 120.0

[agent]
llm = "mock"
top_k = 5
max_steps = 5
read_max_tokens = 2000

[embedding]
enabled = false
backend = "none"
model = "BAAI/bge-small-en-v1.5"
batch_size = 8
max_length = 512
device = ""

[toolret]
queries = "tests/fixtures/toolret_queries.jsonl"
tools = "tests/fixtures/toolret_tools.jsonl"
first_stage_candidates = ""
subset = ""
category = "all"
limit = 30
top_k = 10
use_instruction = true
# Use "hybrid" for this repo's searcher, "toolret-rankgpt" for the ToolRet paper
# LLM baseline over NV-Embed-v1 first-stage candidates, or "rankgpt" for the
# older local approximation that can fall back to the hybrid searcher.
baseline = "hybrid"
llm = "mock"
# Candidate generation can use "hf-transformers" for practical local embedding
# models or "nv-embed" for the paper-faithful NV-Embed-v1 path.
first_stage_model = "BAAI/bge-base-en-v1.5"
first_stage_backend = "auto"
embed_batch_size = 8
embed_max_length = 512
embed_device = ""
candidate_pool_size = 100
rankgpt_window_size = 20
rankgpt_step_size = 10
workers = 1
output = ""
