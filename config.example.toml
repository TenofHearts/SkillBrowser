[llm]
base_url = "https://your-provider.example/v1"
api_key = "replace-with-your-api-key"
model = "Qwen/Qwen3.5-397B-A17B"
temperature = 0.0
max_tokens = 1024
timeout = 120.0

[agent]
llm = "mock"
top_k = 5
max_steps = 5
read_max_tokens = 2000

[embedding]
enabled = false
backend = "none"
model = "BAAI/bge-small-en-v1.5"
batch_size = 8
max_length = 512
device = ""
cache_dir = "data/eval/sra/embedding_cache"

[search]
minimum_score_threshold = 0.0
weight_lexical = 1.0
weight_sparse_view = 0.35
weight_dense = 0.45
weight_rrf = 0.2
weight_capability = 0.25
weight_usage = 0.15
weight_input_type = 0.2
weight_output_type = 0.2
weight_penalty = 0.4

[sra]
skill_dirs = [
  "data/eval/sra/theoremQA",
  "data/eval/sra/logicbench",
  "data/eval/sra/toolqa",
  "data/eval/sra/champ",
  "data/eval/sra/medcalcbench",
  "data/eval/sra/bigcodebench",
  "data/eval/sra/web",
]
